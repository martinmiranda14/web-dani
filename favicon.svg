<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1c1710"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#b89840"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Staff lines (pentagrama) behind text -->
  <line x1="4" y1="11" x2="28" y2="11" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
  <line x1="4" y1="14" x2="28" y2="14" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
  <line x1="4" y1="17" x2="28" y2="17" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
  <line x1="4" y1="20" x2="28" y2="20" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>

  <!-- DVO text styled as musical typography -->
  <text x="16" y="19.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="url(#gold)" letter-spacing="1">DVO</text>

  <!-- Small treble clef accent top-left -->
  <text x="5" y="10" font-size="7" fill="#c9a84c" opacity="0.5" font-family="serif">&#119070;</text>

  <!-- Tiny note bottom-right -->
  <text x="24" y="28" font-size="5" fill="#c9a84c" opacity="0.4" font-family="serif">&#9835;</text>
</svg>
