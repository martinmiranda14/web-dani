<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1c1710"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b65e"/>
      <stop offset="100%" stop-color="#b89840"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Fish body - oval -->
  <ellipse cx="16" cy="17" rx="9" ry="6" fill="url(#gold)"/>

  <!-- Tail -->
  <path d="M7 17 L3 12.5 L5.5 17 L3 21.5Z" fill="url(#gold)"/>

  <!-- Dorsal fin shaped as musical note stem + flag -->
  <rect x="15" y="5" width="2" height="8" rx="0.5" fill="url(#gold)"/>
  <path d="M17 5 C17 5 21 4 21 7.5 C20 6.5 18 7 17 7.5" fill="url(#gold)"/>

  <!-- Eye -->
  <circle cx="21" cy="16" r="1.6" fill="#0a0806"/>
  <circle cx="21" cy="16" r="0.9" fill="#1a1510"/>
  <circle cx="21.3" cy="15.7" r="0.35" fill="#e8c97a"/>

  <!-- Mouth / smile -->
  <path d="M23.5 19 Q25 18 25 16.5" stroke="#0a0806" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Gill lines -->
  <line x1="18.5" y1="14.5" x2="18.5" y2="19.5" stroke="#0a0806" stroke-width="0.5" opacity="0.4"/>
  <line x1="17.3" y1="14.8" x2="17.3" y2="19.2" stroke="#0a0806" stroke-width="0.5" opacity="0.35"/>

  <!-- Small floating music note -->
  <g transform="translate(24, 8)" opacity="0.8">
    <ellipse cx="1.5" cy="4" rx="1.3" ry="1" transform="rotate(-15 1.5 4)" fill="#e8c97a"/>
    <rect x="2.5" y="0" width="0.7" height="4.2" rx="0.3" fill="#e8c97a"/>
    <path d="M3.2 0 C3.2 0 5.2 -0.5 5.2 1.5 C4.7 1 3.7 1.2 3.2 1.5" fill="#e8c97a"/>
  </g>
</svg>
